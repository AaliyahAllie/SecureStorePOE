trigger:
- master

pr:
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '24'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '$(NODE_VERSION)'
  displayName: 'Use Node.js $(NODE_VERSION)'

- script: |
    cd backend
    npm install --legacy-peer-deps
    npm test
  displayName: 'Install backend dependencies and run backend tests'

- script: |
    cd backend
    npm audit --audit-level=high || true
  displayName: 'Run backend dependency audit'

- script: |
    cd frontend
    npm install
    CI=true npm test -- --watchAll=false
    npm run build
  displayName: 'Install frontend dependencies, run frontend tests, and build'

- script: |
    cd frontend
    npm audit --audit-level=high || true
  displayName: 'Run frontend dependency audit'
