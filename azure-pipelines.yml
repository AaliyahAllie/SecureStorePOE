# azure-pipelines.yml

trigger:
  branches:
    include:
      - master
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"
    displayName: "Install Node.js"

  - script: |
      cd backend
      npm install
      npm test
    displayName: "Run backend tests"

  - script: |
      cd frontend
      npm install
      npm test -- --watchAll=false
    displayName: "Run frontend tests"